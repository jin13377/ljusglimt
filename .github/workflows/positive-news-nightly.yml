name: Ljusglimt scheduled news

on:
  schedule:
    - cron: "0 0,12 * * *"
      timezone: "Europe/Stockholm"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: positive-news-scheduled
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch and rank allowlisted RSS news
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/fetch_positive_news.py --force
          else
            python scripts/fetch_positive_news.py
          fi

      - name: Test deterministic pipeline
        run: python -m unittest discover -s tests -v

      - name: Commit source-bound update
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- data/news.json data/history.json; then
            echo "No source changes"
          else
            git config user.name "ljusglimt-bot"
            git config user.email "ljusglimt-bot@users.noreply.github.com"
            git add data/news.json data/history.json
            git commit -m "chore(news): scheduled source update"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Check optional OpenAI secret
        id: openai
        shell: bash
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is missing; RSS update succeeded and Codex summaries are skipped."
          fi

      - name: Let Codex draft source-bound Swedish summaries
        if: steps.openai.outputs.available == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/positive-news-summary.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral", "--ignore-user-config"]'
          output-file: codex-output.md

      - name: Validate and commit agent summaries only
        if: steps.openai.outputs.available == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --force "$remote" "refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          trusted_head="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "$(git rev-parse HEAD)" != "$trusted_head" ]; then
            echo "Codex created or changed local commits; refusing to publish."
            exit 1
          fi
          unexpected="$(git status --porcelain --untracked-files=all | sed 's/^...//' | grep -Ev '^(data/news.json|data/summaries.pending.json)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Codex changed disallowed files:"
            echo "$unexpected"
            exit 1
          fi
          git show "${trusted_head}:data/news.json" > "$RUNNER_TEMP/news-before-agent.json"
          python scripts/validate_agent_news_changes.py \
            --before "$RUNNER_TEMP/news-before-agent.json" \
            --after data/news.json
          python -m unittest discover -s tests -v
          python -m json.tool data/news.json > /dev/null
          if git diff --quiet -- data/news.json; then
            echo "No new summaries"
            exit 0
          fi
          git add data/news.json
          git commit -m "chore(news): add source-bound Codex summaries"
          git push "$remote" "HEAD:${GITHUB_REF_NAME}"
