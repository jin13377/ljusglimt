name: Ljusglimt scheduled news

on:
  schedule:
    - cron: "0 0,12 * * *"
      timezone: "Europe/Stockholm"
  workflow_dispatch:
    inputs:
      generate_images:
        description: "Skapa upp till tre betalda AI-bilder"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: positive-news-scheduled
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install image-generation dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and rank allowlisted RSS news
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/fetch_positive_news.py --force
          else
            python scripts/fetch_positive_news.py --scheduled
          fi

      - name: Create free local article illustrations
        run: |
          python scripts/generate_free_article_visuals.py \
            --news data/news.json \
            --output-dir public/news-images/generated

      - name: Test deterministic pipeline
        run: python -m unittest discover -s tests -v

      - name: Commit source-bound update
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- data/news.json data/history.json public/news-images/generated; then
            echo "No source changes"
          else
            git config user.name "ljusglimt-bot"
            git config user.email "ljusglimt-bot@users.noreply.github.com"
            git add data/news.json data/history.json public/news-images/generated
            git commit -m "chore(news): scheduled editorial update"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Check optional OpenAI secret
        id: openai
        shell: bash
        env:
          SUMMARY_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMAGE_KEY: ${{ secrets.OPENAI_IMAGE_API_KEY }}
        run: |
          if [ -n "$SUMMARY_KEY" ]; then
            echo "summaries_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "summaries_available=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is missing; RSS update succeeded and Codex summaries are skipped."
          fi
          if [ -n "$IMAGE_KEY" ] || [ -n "$SUMMARY_KEY" ]; then
            echo "images_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "images_available=false" >> "$GITHUB_OUTPUT"
            echo "No image API key is configured; local category illustrations remain active."
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.generate_images }}" = "true" ]; then
            echo "images_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "images_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Manual image generation was not enabled."
          fi

      - name: Check optional Cloudflare Workers AI secret
        id: cloudflare
        shell: bash
        env:
          CF_TOKEN: ${{ secrets.CF_IMAGE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "cf_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "cf_available=false" >> "$GITHUB_OUTPUT"
            echo "CF_IMAGE_API_TOKEN is missing; Cloudflare image generation is skipped."
          fi

      - name: Generate article illustrations via Cloudflare Workers AI
        if: steps.cloudflare.outputs.cf_available == 'true'
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_IMAGE_API_TOKEN: ${{ secrets.CF_IMAGE_API_TOKEN }}
        run: |
          cp data/news.json "$RUNNER_TEMP/news-before-cf.json"
          set +e
          python scripts/generate_cf_article_images.py \
            --news data/news.json \
            --output-dir public/news-images/ai/articles \
            --max-images 3
          generator_status=$?
          set -e
          if [ "$generator_status" -ne 0 ]; then
            echo "No Cloudflare article image was generated; the site keeps its local category fallback."
          fi

      - name: Generate source-bound article illustrations
        if: steps.openai.outputs.images_available == 'true' && steps.openai.outputs.images_enabled == 'true'
        shell: bash
        env:
          OPENAI_IMAGE_API_KEY: ${{ secrets.OPENAI_IMAGE_API_KEY || secrets.OPENAI_API_KEY }}
        run: |
          cp data/news.json "$RUNNER_TEMP/news-before-images.json"
          set +e
          python scripts/generate_article_images.py \
            --news data/news.json \
            --output-dir public/news-images/ai/articles \
            --max-images 3
          generator_status=$?
          set -e
          if [ "$generator_status" -eq 2 ]; then
            echo "The image generator configuration is invalid."
            exit 2
          fi
          if [ "$generator_status" -ne 0 ]; then
            echo "No article image was generated; the site keeps its local category fallback."
          fi

      - name: Validate and commit article illustrations only
        if: (steps.openai.outputs.images_available == 'true' && steps.openai.outputs.images_enabled == 'true') || steps.cloudflare.outputs.cf_available == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --force "$remote" "refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          trusted_head="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "$(git rev-parse HEAD)" != "$trusted_head" ]; then
            echo "The remote branch changed during image generation; refusing to publish."
            exit 1
          fi

          changed_paths="$(git status --porcelain --untracked-files=all | sed 's/^...//')"
          unexpected="$(printf '%s\n' "$changed_paths" | grep -Ev '^(data/news.json|public/news-images/ai/articles/[0-9a-f]{20}-[0-9a-f]{8}-v1\.webp)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "The image generator changed disallowed files:"
            echo "$unexpected"
            exit 1
          fi

          # Pick the right pre-generation snapshot: OpenAI or Cloudflare.
          if [ -f "$RUNNER_TEMP/news-before-images.json" ]; then
            BEFORE="$RUNNER_TEMP/news-before-images.json"
          else
            BEFORE="$RUNNER_TEMP/news-before-cf.json"
          fi

          python scripts/validate_generated_image_changes.py \
            --before "$BEFORE" \
            --after data/news.json \
            --images-dir public/news-images/ai/articles \
            --max-changes 3

          python - "$BEFORE" data/news.json > "$RUNNER_TEMP/expected-image-paths.txt" <<'PY'
          import json
          import sys
          from pathlib import Path

          before = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          after = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          for old, new in zip(before.get("items", []), after.get("items", []), strict=True):
              if old.get("ai_image") != new.get("ai_image"):
                  print("public" + new["ai_image"]["url"])
          PY
          printf '%s\n' "$changed_paths" | grep '^public/news-images/ai/articles/' > "$RUNNER_TEMP/actual-image-paths.txt" || true
          while IFS= read -r path; do
            if ! grep -Fxq "$path" "$RUNNER_TEMP/expected-image-paths.txt"; then
              echo "Generated file is not referenced by changed article metadata: $path"
              exit 1
            fi
          done < "$RUNNER_TEMP/actual-image-paths.txt"

          python -m unittest discover -s tests -v
          python -m json.tool data/news.json > /dev/null
          git add data/news.json
          while IFS= read -r path; do
            [ -n "$path" ] && git add -- "$path"
          done < "$RUNNER_TEMP/actual-image-paths.txt"
          if git diff --cached --quiet; then
            echo "No new article illustrations"
            exit 0
          fi
          git config user.name "ljusglimt-bot"
          git config user.email "ljusglimt-bot@users.noreply.github.com"
          git commit -m "chore(news): add source-bound article illustrations"
          git push "$remote" "HEAD:${GITHUB_REF_NAME}"

      - name: Let Codex draft source-bound Swedish summaries
        if: steps.openai.outputs.summaries_available == 'true'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/positive-news-summary.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral", "--ignore-user-config"]'
          output-file: codex-output.md

      - name: Validate and commit agent summaries only
        if: steps.openai.outputs.summaries_available == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --force "$remote" "refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          trusted_head="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "$(git rev-parse HEAD)" != "$trusted_head" ]; then
            echo "Codex created or changed local commits; refusing to publish."
            exit 1
          fi
          unexpected="$(git status --porcelain --untracked-files=all | sed 's/^...//' | grep -Ev '^(data/news.json|data/summaries.pending.json)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Codex changed disallowed files:"
            echo "$unexpected"
            exit 1
          fi
          git show "${trusted_head}:data/news.json" > "$RUNNER_TEMP/news-before-agent.json"
          python scripts/validate_agent_news_changes.py \
            --before "$RUNNER_TEMP/news-before-agent.json" \
            --after data/news.json
          python -m unittest discover -s tests -v
          python -m json.tool data/news.json > /dev/null
          if git diff --quiet -- data/news.json; then
            echo "No new summaries"
            exit 0
          fi
          git add data/news.json
          git commit -m "chore(news): add source-bound Codex summaries"
          git push "$remote" "HEAD:${GITHUB_REF_NAME}"
